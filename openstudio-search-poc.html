<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Open Studio Search — Validation POC</title>
<!--
  ARC-007 step 2 (RE-CUT) — Open Studio Search validation POC
  Builder: Sam · Spec: Rex_to_Sam_SearchableIndex_Validation_Spec_ReCut_2026-06-18.md
  Date: 2026-06-18

  DECIDED SHAPE (fork resolved 2026-06-18): each result gives the member BOTH
    (a) a nested exact-second player — instant retrieval, freeze-safe; and
    (b) an "Open the full lesson" deep-link (target=_top) into the real
        Thinkific lesson for that project (handouts / materials / full index).

  WHAT THIS POC VALIDATES (re-cut spec, priority order):
    1. PIVOT (highest risk) — does the DOMAIN-LOCKED Vimeo video actually PLAY
       in the nested player from OUR hosting origin? Vimeo's domain-lock checks
       the embedding document's origin (= this page), so "we control the player"
       does NOT guarantee playback. If blocked, mitigation = add our host to the
       Vimeo domain whitelist (we own the account). Report which: played as-is /
       blocked-until-whitelist / unresolved.
    2. The "Open the full lesson" link lands on the correct lesson via target=_top.
    3. Data-exposure — what's fetchable at the bare iframe URL (caption snippets).
       Record, don't block.

  NOTE ON RECORDS: all records point at the verified-loaded video 1076987319
  at different timestamps, so every click lands a REAL moment in a REAL video
  (per Rex: "use a record whose video is actually loaded so the click is real").
  Project / title / snippet text is illustrative — only the MECHANISMS are under
  test, not snippet accuracy.

  DATA DEPENDENCY FLAGGED (re-cut spec item 2): the search records carry
  video_id + timestamp + project, but NOT a Thinkific lesson URL. A
  result->lesson-URL mapping is a real MVP data requirement that does not yet
  exist in the source. For this POC, lesson_url is HARD-CODED to the canonical
  Open Studio bundle URL as a reachable stand-in, purely to prove the target=_top
  navigation mechanism. Real per-project lesson URLs must be sourced/built at MVP.
-->
<style>
  :root {
    --brand-teal: #006472;
    --ink: #1d1d1d;
    --muted: #5f6b6d;
    --line: #d9e0e1;
    --bg: #ffffff;
    --hit: #eef6f7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.45;
  }
  .wrap { max-width: 900px; margin: 0 auto; padding: 20px 16px 48px; }
  h1 { font-size: 1.15rem; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 0.85rem; margin: 0 0 18px; }

  .player-shell {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .player-shell iframe {
    position: absolute; inset: 0; width: 100%; height: 100%; border: 0;
  }

  .search-row { display: flex; gap: 8px; margin-bottom: 14px; }
  #q {
    flex: 1;
    padding: 11px 13px;
    font-size: 1rem;
    border: 1px solid var(--line);
    border-radius: 8px;
    outline: none;
  }
  #q:focus { border-color: var(--brand-teal); }
  .count { color: var(--muted); font-size: 0.8rem; margin: 0 0 10px; }

  ul.results { list-style: none; margin: 0; padding: 0; }
  li.result {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  li.result:hover { background: var(--hit); border-color: var(--brand-teal); }
  .r-top { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .r-title { font-weight: 600; }
  .r-project { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
  .r-time {
    flex: 0 0 auto; font-variant-numeric: tabular-nums;
    color: var(--brand-teal); font-weight: 600; font-size: 0.9rem;
  }
  .r-snippet { color: var(--ink); font-size: 0.92rem; margin-top: 4px; }
  .r-snippet mark { background: #ffe9a8; padding: 0 1px; }
  .empty { color: var(--muted); font-style: italic; padding: 8px 2px; }

  .r-actions { display: flex; gap: 14px; align-items: center; margin-top: 9px; }
  .r-jump {
    font-size: 0.82rem; color: var(--brand-teal); font-weight: 600;
  }
  .r-lesson {
    font-size: 0.82rem; color: var(--brand-teal); text-decoration: none;
    border-bottom: 1px solid var(--brand-teal); padding-bottom: 1px;
  }
  .r-lesson:hover { background: var(--hit); }

  .status {
    margin-top: 16px; padding: 9px 12px; border-radius: 6px;
    background: #f3f6f6; color: var(--muted); font-size: 0.82rem;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Open Studio — search the library</h1>
  <p class="sub">Validation POC · type to filter · click a result to jump to that moment</p>

  <div class="player-shell">
    <!-- The nested Vimeo player. This is the iframe's OWN player (claim 2). -->
    <iframe id="vimeo"
            src="https://player.vimeo.com/video/1076987319?title=0&byline=0&portrait=0"
            allow="autoplay; fullscreen; picture-in-picture"
            referrerpolicy="strict-origin-when-cross-origin"></iframe>
  </div>

  <div class="search-row">
    <input id="q" type="search" placeholder="Search a technique, tool, or moment…" autocomplete="off">
  </div>
  <p class="count" id="count"></p>
  <ul class="results" id="results"></ul>

  <div class="status" id="status">Loading Vimeo player…</div>
</div>

<script src="https://player.vimeo.com/api/player.js"></script>
<script>
(function () {
  "use strict";

  // --- Hard-coded records (POC). All on the verified-loaded video 1076987319. ---
  // Real product would load these from the search index. Here they are inline
  // precisely so claim 3 (what's exposed at the bare URL) is concrete.
  // lesson_url is a hard-coded POC stand-in (canonical Open Studio bundle URL) —
  // real per-project Thinkific lesson URLs are an MVP data requirement that does
  // not yet exist in the records (see header note + re-cut spec item 2).
  var LESSON_URL_POC = "https://learning.makeryarts.com/bundles/open-studio-community";
  var RECORDS = [
    { project: "Open Studio", title: "Session opening",        snippet: "Welcome and what we're making today.",            video_id: "1076987319", t: 7,   lesson_url: LESSON_URL_POC },
    { project: "Open Studio", title: "Setting up the bench",   snippet: "Tools laid out before we start forming.",          video_id: "1076987319", t: 45,  lesson_url: LESSON_URL_POC },
    { project: "Open Studio", title: "First demo",             snippet: "Walking through the first technique on the metal.", video_id: "1076987319", t: 120, lesson_url: LESSON_URL_POC },
    { project: "Open Studio", title: "Working the detail",     snippet: "Close-up on the finishing pass.",                  video_id: "1076987319", t: 240, lesson_url: LESSON_URL_POC },
    { project: "Open Studio", title: "Wrap-up",                snippet: "Final thoughts and next steps.",                   video_id: "1076987319", t: 420, lesson_url: LESSON_URL_POC }
  ];

  var player = new Vimeo.Player(document.getElementById("vimeo"));
  var statusEl  = document.getElementById("status");
  var resultsEl = document.getElementById("results");
  var countEl   = document.getElementById("count");
  var qEl       = document.getElementById("q");
  var currentVideo = "1076987319";

  player.ready().then(function () {
    setStatus("Player ready. Click any result to jump.");
  }).catch(function (e) {
    setStatus("Player failed to load: " + (e && e.message ? e.message : e));
  });

  function setStatus(msg) {
    statusEl.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
  }

  function fmt(sec) {
    var m = Math.floor(sec / 60), s = sec % 60;
    return m + ":" + (s < 10 ? "0" : "") + s;
  }

  // Deep-link: keep playback INSIDE this page's player (claim 2).
  // If the result is a different video, load it first; then seek; then play.
  function jumpTo(rec) {
    setStatus("Jumping to " + rec.title + " @ " + fmt(rec.t) + " (video " + rec.video_id + ")…");
    var seekAndPlay = function () {
      return player.setCurrentTime(rec.t).then(function () {
        return player.play();
      }).then(function () {
        setStatus("Landed: " + rec.title + " @ " + fmt(rec.t) + " — playing in this page's own player.");
      });
    };
    if (rec.video_id !== currentVideo) {
      player.loadVideo(Number(rec.video_id)).then(function () {
        currentVideo = rec.video_id;
        return seekAndPlay();
      }).catch(function (e) {
        setStatus("Could not load video " + rec.video_id + ": " + (e && e.message ? e.message : e));
      });
    } else {
      seekAndPlay().catch(function (e) {
        setStatus("Seek failed: " + (e && e.message ? e.message : e));
      });
    }
  }

  function highlight(text, q) {
    if (!q) return text;
    var i = text.toLowerCase().indexOf(q.toLowerCase());
    if (i < 0) return text;
    return text.slice(0, i) + "<mark>" + text.slice(i, i + q.length) + "</mark>" + text.slice(i + q.length);
  }

  function render(q) {
    q = (q || "").trim();
    var matches = RECORDS.filter(function (r) {
      if (!q) return true;
      var hay = (r.project + " " + r.title + " " + r.snippet).toLowerCase();
      return hay.indexOf(q.toLowerCase()) >= 0;
    });

    countEl.textContent = matches.length + (matches.length === 1 ? " result" : " results");
    resultsEl.innerHTML = "";

    if (!matches.length) {
      var li = document.createElement("li");
      li.className = "empty";
      li.textContent = "No moments match “" + q + "”.";
      resultsEl.appendChild(li);
      return;
    }

    matches.forEach(function (r) {
      var li = document.createElement("li");
      li.className = "result";
      li.innerHTML =
        '<div class="r-top">' +
          '<div><div class="r-project">' + r.project + '</div>' +
          '<div class="r-title">' + highlight(r.title, q) + '</div></div>' +
          '<div class="r-time">' + fmt(r.t) + '</div>' +
        '</div>' +
        '<div class="r-snippet">' + highlight(r.snippet, q) + '</div>' +
        '<div class="r-actions">' +
          '<span class="r-jump">▶ Jump to this moment</span>' +
          '<a class="r-lesson" href="' + r.lesson_url + '" target="_top" rel="noopener">Open the full lesson ↗</a>' +
        '</div>';
      // Clicking the row (or the jump label) cues the moment in the nested player.
      li.addEventListener("click", function () { jumpTo(r); });
      // The lesson link escapes the iframe via target=_top — must NOT also fire jumpTo.
      var lessonLink = li.querySelector(".r-lesson");
      lessonLink.addEventListener("click", function (e) {
        e.stopPropagation();
        setStatus("Opening full lesson (target=_top) → " + r.lesson_url);
      });
      resultsEl.appendChild(li);
    });
  }

  qEl.addEventListener("input", function () { render(qEl.value); });
  render("");
})();
</script>
</body>
</html>
